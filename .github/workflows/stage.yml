---
name: Staging
on:
  workflow_dispatch:
    inputs:
      baseSha:
        description: "Use base SHA commit to deploy from (empty string defaults to last commit before HEAD)"
        type: string
        required: false
        default: ""
      deployAll:
        description: "Force deploy all files"
        type: boolean
        default: false
jobs:
  deployment:
    name: Deployment
    if: github.actor != 'adp-devsite-app[bot]'
    uses: AdobeDocs/adp-devsite-workflow/.github/workflows/deploy.yml@main
    secrets:
      ADP_DEVSITE_APP_ID: ${{ secrets.ADP_DEVSITE_APP_ID }}
      ADP_DEVSITE_APP_PRIVATE_KEY: ${{ secrets.ADP_DEVSITE_APP_PRIVATE_KEY }}
    with:
      env: stage
      baseSha: ${{ inputs.baseSha }}
      deployAll: ${{ inputs.deployAll }}
